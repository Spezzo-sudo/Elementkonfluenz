name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brain-smoke-test:
    name: Python Brain smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-engine/brain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: content-engine/brain/pyproject.toml

      - name: Install Brain package
        run: python -m pip install -e .

      - name: Import package
        run: python -c "import elementkonfluenz_brain; print(elementkonfluenz_brain.__name__)"

      - name: CLI help smoke test
        run: python -m elementkonfluenz_brain.cli --help

  orchestrator-smoke-test:
    name: Orchestrator dry-run smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install Orchestrator package
        run: python -m pip install -e .

      - name: CLI help smoke test
        run: python -m elementkonfluenz_orchestrator.cli --help

      - name: Create dry-run job
        run: python -m elementkonfluenz_orchestrator.cli --dry-run --topic "Gold vs S&P 500" --out ../runs/ci-dry-run

      - name: Verify dry-run artifacts
        run: |
          test -f ../runs/ci-dry-run/topic_brief.json
          test -f ../runs/ci-dry-run/sources.json
          test -f ../runs/ci-dry-run/job_result.json
          test -f ../runs/ci-dry-run/logs/orchestrator.log

  renderer-typecheck:
    name: Remotion renderer typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-engine/renderer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: content-engine/renderer/package-lock.json

      - name: Install renderer dependencies
        run: npm ci

      - name: Typecheck renderer
        run: npm run typecheck
