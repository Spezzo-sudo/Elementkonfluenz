name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brain-smoke-test:
    name: Python Brain smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-engine/brain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: content-engine/brain/pyproject.toml

      - name: Install Brain package
        run: python -m pip install -e .

      - name: Import package
        run: python -c "import elementkonfluenz_brain; print(elementkonfluenz_brain.__name__)"

      - name: CLI help smoke test
        run: python -m elementkonfluenz_brain.cli --help

  trend-engine-smoke-test:
    name: ValueRacer trend-engine market scan smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: trend-engine/pyproject.toml

      - name: Install trend-engine package
        run: python -m pip install -e trend-engine

      - name: CLI help smoke test
        run: python -m trend_engine.cli --help

      - name: Select market-scan topic
        run: |
          python -m trend_engine.cli \
            --dry-run \
            --mode market_scan \
            --out runs/ci-market-scan/topic_brief.json \
            --sources-out runs/ci-market-scan/sources.json \
            --history runs/history.jsonl \
            --write-history

      - name: Verify trend artifacts
        run: |
          test -f runs/ci-market-scan/topic_brief.json
          test -f runs/ci-market-scan/sources.json
          test -f runs/history.jsonl

      - name: Verify cooldown fallback selects a different topic
        run: |
          python -m trend_engine.cli \
            --dry-run \
            --mode market_scan \
            --out runs/ci-market-scan-2/topic_brief.json \
            --sources-out runs/ci-market-scan-2/sources.json \
            --history runs/history.jsonl \
            --write-history
          test -f runs/ci-market-scan-2/topic_brief.json
          test -f runs/ci-market-scan-2/sources.json

  orchestrator-smoke-test:
    name: ValueRacer orchestrator dry-run smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install Orchestrator package
        run: python -m pip install -e .

      - name: CLI help smoke test
        run: python -m valueracer_orchestrator.cli --help

      - name: Create dry-run job
        run: python -m valueracer_orchestrator.cli --dry-run --topic "Gold vs S&P 500" --out ../runs/ci-dry-run

      - name: Verify dry-run artifacts
        run: |
          test -f ../runs/ci-dry-run/topic_brief.json
          test -f ../runs/ci-dry-run/sources.json
          test -f ../runs/ci-dry-run/job_result.json
          test -f ../runs/ci-dry-run/logs/orchestrator.log

  seo-smoke-test:
    name: ValueRacer SEO dry-run smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            orchestrator/pyproject.toml
            seo-engine/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install -e orchestrator
          python -m pip install -e seo-engine

      - name: Create orchestrator dry-run job
        run: python -m valueracer_orchestrator.cli --dry-run --topic "Gold vs S&P 500" --out runs/ci-seo-dry-run

      - name: Generate YouTube metadata dry-run
        run: python -m valueracer_seo.cli --dry-run --run-dir runs/ci-seo-dry-run

      - name: Verify SEO artifacts
        run: |
          test -f runs/ci-seo-dry-run/metadata/youtube.json
          test -f runs/ci-seo-dry-run/publish/youtube_publish_plan.json

  orchestrator-youtube-seo-integration:
    name: Orchestrator with YouTube SEO dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            orchestrator/pyproject.toml
            seo-engine/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install -e orchestrator
          python -m pip install -e seo-engine

      - name: Create full dry-run job
        run: python -m valueracer_orchestrator.cli --dry-run --with-youtube-seo --topic "Gold vs S&P 500" --out runs/ci-full-dry-run

      - name: Verify integrated artifacts
        run: |
          test -f runs/ci-full-dry-run/topic_brief.json
          test -f runs/ci-full-dry-run/sources.json
          test -f runs/ci-full-dry-run/metadata/youtube.json
          test -f runs/ci-full-dry-run/publish/youtube_publish_plan.json
          test -f runs/ci-full-dry-run/job_result.json

  orchestrator-market-scan-integration:
    name: Orchestrator with market_scan and YouTube SEO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            orchestrator/pyproject.toml
            trend-engine/pyproject.toml
            seo-engine/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install -e orchestrator
          python -m pip install -e trend-engine
          python -m pip install -e seo-engine

      - name: Create market-scan dry-run job
        run: |
          python -m valueracer_orchestrator.cli \
            --dry-run \
            --run-mode market_scan \
            --with-youtube-seo \
            --out runs/ci-market-scan-full

      - name: Verify market-scan integrated artifacts
        run: |
          test -f runs/ci-market-scan-full/topic_brief.json
          test -f runs/ci-market-scan-full/sources.json
          test -f runs/ci-market-scan-full/metadata/youtube.json
          test -f runs/ci-market-scan-full/publish/youtube_publish_plan.json
          test -f runs/ci-market-scan-full/job_result.json
          test -f runs/ci-market-scan-full/logs/orchestrator.log
          test -f runs/history.jsonl

  qa-engine-smoke-test:
    name: QA engine validates market_scan dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            orchestrator/pyproject.toml
            trend-engine/pyproject.toml
            seo-engine/pyproject.toml
            qa-engine/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install -e orchestrator
          python -m pip install -e trend-engine
          python -m pip install -e seo-engine
          python -m pip install -e qa-engine

      - name: Create market-scan dry-run job
        run: |
          python -m valueracer_orchestrator.cli \
            --dry-run \
            --run-mode market_scan \
            --with-youtube-seo \
            --out runs/ci-qa-market-scan

      - name: Run QA dry-run
        run: |
          python -m qa_engine.cli \
            --dry-run \
            --run-dir runs/ci-qa-market-scan \
            --history runs/history.jsonl

      - name: Verify QA artifact
        run: |
          test -f runs/ci-qa-market-scan/qa.json
          python - <<'PY'
          import json
          payload = json.load(open('runs/ci-qa-market-scan/qa.json', encoding='utf-8'))
          assert payload['ok'] is True
          assert payload['hard_fail'] is False
          assert payload['requires_review'] is True
          assert payload['ready_to_publish'] is False
          PY

  orchestrator-qa-integration:
    name: Orchestrator with market_scan, YouTube SEO, and QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            orchestrator/pyproject.toml
            trend-engine/pyproject.toml
            seo-engine/pyproject.toml
            qa-engine/pyproject.toml

      - name: Install packages
        run: |
          python -m pip install -e orchestrator
          python -m pip install -e trend-engine
          python -m pip install -e seo-engine
          python -m pip install -e qa-engine

      - name: Create full QA-gated dry-run job
        run: |
          python -m valueracer_orchestrator.cli \
            --dry-run \
            --run-mode market_scan \
            --with-youtube-seo \
            --with-qa \
            --out runs/ci-qa-gated-market-scan

      - name: Verify QA-gated artifacts
        run: |
          test -f runs/ci-qa-gated-market-scan/topic_brief.json
          test -f runs/ci-qa-gated-market-scan/sources.json
          test -f runs/ci-qa-gated-market-scan/metadata/youtube.json
          test -f runs/ci-qa-gated-market-scan/publish/youtube_publish_plan.json
          test -f runs/ci-qa-gated-market-scan/qa.json
          test -f runs/ci-qa-gated-market-scan/job_result.json
          python - <<'PY'
          import json
          qa = json.load(open('runs/ci-qa-gated-market-scan/qa.json', encoding='utf-8'))
          job = json.load(open('runs/ci-qa-gated-market-scan/job_result.json', encoding='utf-8'))
          assert qa['ok'] is True
          assert qa['hard_fail'] is False
          assert job['ok'] is True
          assert 'qa.json' in job['artifacts']
          assert job['requires_review'] is True
          assert job['ready_to_publish'] is False
          PY

  ops-runner-template-smoke-test:
    name: Ops runner templates smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell runner syntax
        run: bash -n ops/hermes_valueracer_dry_run.sh

      - name: Verify ops templates exist
        run: |
          test -f ops/HERMES_VPS_RUNNER.md
          test -f ops/hermes_valueracer_dry_run.sh
          test -f ops/systemd/valueracer-dry-run.service
          test -f ops/systemd/valueracer-dry-run.timer
          test -f ops/cron/valueracer-dry-run.cron

      - name: Verify runner remains dry-run gated
        run: |
          grep -q -- '--dry-run' ops/hermes_valueracer_dry_run.sh
          grep -q -- '--with-qa' ops/hermes_valueracer_dry_run.sh
          grep -q 'VALUERACER_DRY_RUN' ops/hermes_valueracer_dry_run.sh

  renderer-typecheck:
    name: Remotion renderer typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-engine/renderer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: content-engine/renderer/package-lock.json

      - name: Install renderer dependencies
        run: npm ci

      - name: Typecheck renderer
        run: npm run typecheck
